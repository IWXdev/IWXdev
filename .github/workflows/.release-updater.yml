name: Update Release Info
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Latest Release from API
        id: get_release
        uses: octokit/request-action@v2.x
        with:
          route: GET /repos/IWXdev/Echoes-Of-Frost-Mobile/releases/latest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Update README.md
        env:
          TAG: ${{ steps.get_release.outputs.data && fromJSON(steps.get_release.outputs.data).tag_name || 'v1.2' }}
          URL: ${{ steps.get_release.outputs.data && fromJSON(steps.get_release.outputs.data).html_url || 'https://github.com/IWXdev/Echoes-Of-Frost-Mobile' }}
        run: |
          perl -i -0777 -pe "s/.*?/\n- 🚀 Latest: [$ENV{TAG}]($ENV{URL})\n/s" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "IWXdev"
          git config --global user.email "action@github.com"
          git add README.md
          git commit -m "docs: update latest release info [skip ci]" || exit 0
          git push
