name: Update Release Info
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch Latest Release from API
        id: get_release
        uses: octokit/request-action@v2.x
        with:
          route: GET /repos/IWXdev/Echoes-Of-Frost-Mobile/releases/latest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Update README.md
        run: |
          TAG_NAME=$(echo '${{ steps.get_release.outputs.data }}' | jq -r '.tag_name')
          HTML_URL=$(echo '${{ steps.get_release.outputs.data }}' | jq -r '.html_url')
          
          perl -i -0777 -pe "s/.*?/\n-  Latest: [$TAG_NAME]($HTML_URL)\n/s" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "IWXdev"
          git config --global user.email "action@github.com"
          git add README.md
          git commit -m "docs: update latest release info [skip ci]" || exit 0
          git push
