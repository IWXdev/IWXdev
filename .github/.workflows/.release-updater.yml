name: Update Release Info
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update README
        uses: x0rtex/get-github-release@main
        with:
          repository: "IWXdev/Echoes-Of-Frost-Mobile"
          type: "latest"